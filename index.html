<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>mrbytehub</title>
	<style>
		html,body{height:100%;margin:0;background:#000;color:#0f0;font-family:monospace}
		canvas{position:fixed;inset:0;z-index:0}
	</style>
</head>
<body>
	<canvas id="m"></canvas>
	<script>
		const c=document.getElementById('m'),ctx=c.getContext('2d');
		function fit(){c.width=innerWidth;c.height=innerHeight}
		fit();window.onresize=fit;
		let cols = Math.max(4, Math.floor(innerWidth/14));
		let ypos = new Array(cols).fill(0);
		function fitCols(){
			cols = Math.max(4, Math.floor(innerWidth/14));
			ypos = new Array(cols).fill(0);
		}
		window.addEventListener('resize', fitCols);
		const welcomeWord = 'welcome';
		function loop(){
			ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);
			ctx.fillStyle='#0f0';ctx.font='14px monospace';
			for(let i=0;i<cols;i++){
				const x = i*14;
				let text;
				if(Math.random() < 0.15){
					text = welcomeWord[Math.floor(Math.random()*welcomeWord.length)];
				}else{
					text = Math.random() < 0.5 ? '0' : '1';
				}
				ctx.fillText(text, x, ypos[i]*14);
				if(ypos[i]*14 > c.height + Math.random()*300) ypos[i]=0;
				ypos[i]++;
			}
		}
		setInterval(loop,50);
	</script>
</body>
</html>
